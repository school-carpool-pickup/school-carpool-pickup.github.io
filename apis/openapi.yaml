openapi: 3.0.3

info:
  title: School Pickup & Carpool API
  description: API for Mobile + Staff + Admin.
  version: 1.0.0

servers:
  - url: https://api.production.com/api/v1
    description: Production
  - url: https://api.uat.com/api/v1
    description: UAT
  - url: https://api.dev.com/api/v1
    description: DEV

components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        password:
          tokenUrl: /oauth/token
          scopes: {}
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, example: Bearer }
        expires_in: { type: integer, example: 3600 }
        user_id: { type: string }
        role:
          type: array
          items:
            type: string
            enum: [primary_parent, additional_parent, supplementary, staff, admin, owner]
          description: Roles of the authenticated user — use this to show/hide UI elements on the client side

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        school_id: { type: string, format: uuid }
        family_id: { type: string, format: uuid, nullable: true }
        full_name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        role:
          type: string
          enum: [primary_parent, additional_parent, supplementary, staff, admin, owner]
        status:
          type: string
          enum: [active, pending, suspended, banned]
        invite_status:
          type: string
          enum: [sent, accepted, expired]
          nullable: true
        line_id: { type: string, nullable: true }
        profile_complete: { type: boolean }
        last_login: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    Student:
      type: object
      properties:
        id: { type: string, format: uuid }
        school_id: { type: string, format: uuid }
        family_id: { type: string, format: uuid }
        first_name: { type: string }
        last_name: { type: string }
        grade: { type: string }
        section: { type: string }
        school_email: { type: string }
        date_of_birth: { type: string, format: date }
        blood_type: { type: string }
        photo_url: { type: string, nullable: true }
        preferred_gate: { type: string, nullable: true }
        photo_consent: { type: boolean }
        status:
          type: string
          enum: [enrolled, withdrawn, transferred]
        notes: { type: string, nullable: true }

    MedicalRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        record_type:
          type: string
          enum: [allergy, special_need, medication, other]
        description: { type: string }

    EmergencyContact:
      type: object
      properties:
        id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        contact_name: { type: string }
        contact_phone: { type: string }
        relationship: { type: string, nullable: true }

    Vehicle:
      type: object
      properties:
        id: { type: string, format: uuid }
        owner_id: { type: string, format: uuid }
        license_plate: { type: string }
        brand: { type: string }
        model: { type: string }
        year: { type: integer, nullable: true }
        color: { type: string, nullable: true }
        vehicle_photo_url: { type: string, nullable: true }
        status:
          type: string
          enum: [pending, approved, rejected]
        document_url: { type: string, nullable: true }
        is_default: { type: boolean }
        rejection_reason: { type: string, nullable: true }

    Family:
      type: object
      properties:
        id: { type: string, format: uuid }
        school_id: { type: string, format: uuid }
        family_name: { type: string }
        status:
          type: string
          enum: [active, pending, suspended, banned]
        joined_at: { type: string, format: date-time }
        members:
          type: array
          items: { $ref: '#/components/schemas/User' }

    Invitation:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        role: { type: string }
        status:
          type: string
          enum: [sent, accepted, expired]
        expires_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    Pickup:
      type: object
      properties:
        id: { type: string, format: uuid }
        school_id: { type: string, format: uuid }
        parent_id: { type: string, format: uuid }
        vehicle_id: { type: string, format: uuid, nullable: true }
        vehicle_type:
          type: string
          enum: [registered, taxi]
        taxi_number: { type: string, nullable: true }
        taxi_color: { type: string, nullable: true }
        taxi_notes: { type: string, nullable: true }
        status:
          type: string
          enum: [idle, pre_queue, queued, ready, in_progress, completed, cancelled, no_show]
        queue_display_id: { type: string, example: "PU-20260224-001" }
        queue_number: { type: string, example: "A-001" }
        lane: { type: string, example: "A", nullable: true }
        estimated_wait_mins: { type: integer, nullable: true }
        is_carpool: { type: boolean }
        student_ids:
          type: array
          items: { type: string, format: uuid }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }

    CarpoolRequest:
      type: object
      properties:
        id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        requester_id: { type: string, format: uuid }
        driver_id: { type: string, format: uuid, nullable: true }
        drop_off_lat: { type: number }
        drop_off_lng: { type: number }
        drop_off_address: { type: string }
        price: { type: number, example: 300 }
        status:
          type: string
          enum: [pending, matched, confirmed, in_progress, completed, declined, expired, cancelled]
        created_at: { type: string, format: date-time }
        matched_at: { type: string, format: date-time, nullable: true }
        confirmed_at: { type: string, format: date-time, nullable: true }
        dropped_off_at: { type: string, format: date-time, nullable: true }

    DriverAvailability:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        vehicle_id: { type: string, format: uuid }
        is_available: { type: boolean }
        current_lat: { type: number, nullable: true }
        current_lng: { type: number, nullable: true }

    CarpoolEarnings:
      type: object
      properties:
        today: { type: number, example: 600 }
        active_rides: { type: integer }
        history:
          type: array
          items:
            type: object
            properties:
              carpool_request_id: { type: string, format: uuid }
              amount: { type: number }
              paid_at: { type: string, format: date-time, nullable: true }

    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        type:
          type: string
          enum: [pickup, carpool, announcement, system]
        title: { type: string }
        message: { type: string }
        is_read: { type: boolean }
        action_url: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    Lane:
      type: object
      properties:
        id: { type: string, format: uuid }
        school_id: { type: string, format: uuid }
        name: { type: string, example: A }
        label: { type: string, example: "Lane A - Main Gate" }
        capacity: { type: integer }
        is_active: { type: boolean }

    QueueItem:
      type: object
      properties:
        pickup_id: { type: string, format: uuid }
        queue_number: { type: string }
        parent_name: { type: string }
        vehicle: { type: string }
        students:
          type: array
          items: { type: string }
        status:
          type: string
          enum: [idle, pre_queue, queued, ready, in_progress]
        eta: { type: string }
        carpool_count: { type: integer }

    QueueStats:
      type: object
      properties:
        in_queue: { type: integer }
        ready: { type: integer }
        preparing: { type: integer }
        completed_today: { type: integer }

    AdminDashboardStats:
      type: object
      properties:
        total_families: { type: integer }
        active_pickups_today: { type: integer }
        students_enrolled: { type: integer }
        staff_count: { type: integer }

    Error:
      type: object
      properties:
        error: { type: string }
        message: { type: string }
        status_code: { type: integer }

    PaymentMethod:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        method_type: { type: string, enum: [credit_card, bank_account] }
        card_last4: { type: string, nullable: true }
        card_brand: { type: string, nullable: true }
        bank_name: { type: string, nullable: true }
        bank_account_name: { type: string, nullable: true }
        is_default: { type: boolean }
        created_at: { type: string, format: date-time }

    AfterschoolActivity:
      type: object
      properties:
        id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        activity_date: { type: string, format: date }
        activity_name: { type: string }
        end_time: { type: string, nullable: true }
        source: { type: string, enum: [manual, school_api] }

    CarpoolSchedule:
      type: object
      properties:
        id: { type: string, format: uuid }
        requester_id: { type: string, format: uuid }
        driver_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        drop_off_address: { type: string }
        price: { type: number }
        day_of_week:
          type: array
          items: { type: integer }
          example: [1, 3, 5]
        start_date: { type: string, format: date }
        end_date: { type: string, format: date, nullable: true }
        is_active: { type: boolean }

    School:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        address: { type: string, nullable: true }
        logo_url: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    DisplayQueueItem:
      type: object
      properties:
        queue_number: { type: string }
        student_photo: { type: string, nullable: true }
        student_nickname: { type: string }
        student_grade: { type: string }
        driver_photo: { type: string, nullable: true }
        driver_name: { type: string }
        car_photo: { type: string, nullable: true }
        license_plate: { type: string }

    RevenueStats:
      type: object
      properties:
        revenue: { type: number }
        expenses: { type: number }
        gross_margin: { type: number }
        gross_margin_pct: { type: number }
        paid_pickups: { type: integer }
        chart_data:
          type: array
          items:
            type: object
            properties:
              date: { type: string }
              revenue: { type: number }

security:
  - bearerAuth: []

paths:
  /api/v1/auth/login:
    post:
      summary: Get access token (login)
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type, client_id]
              properties:
                grant_type: { type: string, enum: [password, refresh_token] }
                client_id: { type: string }
                username: { type: string }
                password: { type: string }
                refresh_token: { type: string }
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/TokenResponse' }

  /api/v1/auth/validate:
    post:
      summary: Validate an access token
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [access_token]
              properties:
                access_token: { type: string }
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      valid: { type: boolean }
        '400':
          description: Invalid body request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Token is invalid or expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/auth/register:
    post:
      summary: Register as primary parent
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [register_token, password, first_name, last_name, phone]
              properties:
                register_token: { type: string }
                password: { type: string }
                first_name: { type: string }
                last_name: { type: string }
                phone: { type: string }
      responses:
        '201':
          description: Account created, returns created user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '400':
          description: Invalid body request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Registration failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }



  /api/v1/auth/invitations/{token}:
    get:
      summary: Validate invite token and get pre-filled info
      tags: [Authentication]
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Invitation details
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invitation' }
        '404': { description: Token not found or expired }

  /api/v1/auth/invitations/accept:
    post:
      summary: Accept invitation and create account
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, full_name, phone, password]
              properties:
                token: { type: string }
                full_name: { type: string }
                phone: { type: string }
                password: { type: string }
      responses:
        '201':
          description: Account created and linked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }

  /api/v1/auth/logout:
    post:
      summary: Revoke current token
      tags: [Authentication]
      responses:
        '204': { description: Logged out }

  # ── OTP ───────────────────────────────────────────────────────

  /api/v1/otp/onboarding:
    post:
      summary: Send OTP to email
      tags: [OTP]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message: { type: string, example: otp sent }
                      reference: { type: string, example: REF-XXXXXX }
        '400':
          description: Invalid body request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Failed to send email
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/otp/onboarding/verify:
    post:
      summary: Verify OTP by reference
      tags: [OTP]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reference, otp]
              properties:
                reference: { type: string }
                otp: { type: string }
      responses:
        '200':
          description: OTP verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      register_token: { type: string }
        '400':
          description: Invalid body request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Invalid OTP or expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Could not verify OTP
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /users/me:
    get:
      summary: Get current user profile
      tags: [Users]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
          description: ''
    put:
      summary: Update profile
      tags: [Users]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: { type: string }
                phone: { type: string }
                line_id: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
          description: ''

  /families/me:
    get:
      summary: Get my family with all members
      tags: [Families]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Family' }
          description: ''

  /families/me/members:
    get:
      summary: List all users in my family
      tags: [Families]
      responses:
        '200':
          description: Family members
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }

  /families/me/members/{user_id}:
    delete:
      summary: (Primary only) Remove a family member
      tags: [Families]
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Member removed }

  /families/me/invitations:
    get:
      summary: List pending invitations I sent
      tags: [Families]
      responses:
        '200':
          description: List of sent invitations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Invitation' }
    post:
      summary: Invite a family member
      tags: [Families]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string }
                role:
                  type: string
                  enum: [additional_parent, supplementary]
      responses:
        '201':
          description: Invitation sent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invitation' }

  # ── STUDENTS ──────────────────────────────────────────────────

  /families/me/students:
    get:
      summary: List students in my family
      tags: [Students]
      responses:
        '200':
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Student' }
    post:
      summary: Add a student to family
      tags: [Students]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, grade, school_email]
              properties:
                first_name: { type: string }
                last_name: { type: string }
                grade: { type: string }
                section: { type: string }
                school_email: { type: string }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Student' }
          description: ''

  /students/{student_id}:
    get:
      summary: Get student detail
      tags: [Students]
      parameters:
        - name: student_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Student' }
          description: ''
    put:
      summary: Update student info
      tags: [Students]
      parameters:
        - name: student_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Student' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Student' }
          description: ''

  /students/{student_id}/medical:
    get:
      summary: Get medical records (allergies, special needs)
      tags: [Students]
      parameters:
        - name: student_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Medical records
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MedicalRecord' }
    post:
      summary: Add a medical record
      tags: [Students]
      parameters:
        - name: student_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [record_type, description]
              properties:
                record_type: { type: string, enum: [allergy, special_need, medication, other] }
                description: { type: string }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MedicalRecord' }
          description: ''

  /students/{student_id}/medical/{record_id}:
    delete:
      summary: Remove a medical record
      tags: [Students]
      parameters:
        - name: student_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: record_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }

  /students/{student_id}/emergency-contacts:
    get:
      summary: List emergency contacts
      tags: [Students]
      parameters:
        - name: student_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Emergency contacts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/EmergencyContact' }
    post:
      summary: Add emergency contact
      tags: [Students]
      parameters:
        - name: student_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contact_name, contact_phone]
              properties:
                contact_name: { type: string }
                contact_phone: { type: string }
                relationship: { type: string }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmergencyContact' }
          description: ''

  /students/{student_id}/emergency-contacts/{contact_id}:
    delete:
      summary: Remove emergency contact
      tags: [Students]
      parameters:
        - name: student_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: contact_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }

  /vehicles/me:
    get:
      summary: List my vehicles
      tags: [Vehicles]
      responses:
        '200':
          description: Vehicles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Vehicle' }

  /vehicles:
    post:
      summary: Register a new vehicle
      tags: [Vehicles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [license_plate, brand, model]
              properties:
                license_plate: { type: string }
                brand: { type: string }
                model: { type: string }
                year: { type: integer }
                color: { type: string }
