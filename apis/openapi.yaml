              schema: { $ref: '#/components/schemas/PaymentMethod' }
          description: ''

  /payment-methods/{id}:
    delete:
      summary: Remove a payment method
      tags: [Payment Methods]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }

  /payment-methods/{id}/default:
    put:
      summary: Set as default payment method
      tags: [Payment Methods]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Default updated }

  /students/{student_id}/afterschool-today:
    get:
      summary: Check if student has afterschool activity today
      tags: [Students]
      parameters:
        - name: student_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Afterschool activity status
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_activity: { type: boolean }
                  activity_name: { type: string, nullable: true }
                  end_time: { type: string, nullable: true }

  /pickups/family-active:
    get:
      summary: Check if another family member has an active pickup
      tags: [Pickups]
      responses:
        '200':
          description: Active family pickup or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  exists: { type: boolean }
                  parent_name: { type: string, nullable: true }
                  status: { type: string, nullable: true }
                  queue_number: { type: string, nullable: true }

  /carpools/schedules/mine:
    get:
      summary: My recurring carpool schedules
      tags: [Carpools]
      responses:
        '200':
          description: My schedules
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CarpoolSchedule' }

  /carpools/schedules:
    post:
      summary: Create a recurring carpool schedule
      tags: [Carpools]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [driver_id, student_id, day_of_week, start_date]
              properties:
                driver_id: { type: string, format: uuid }
                student_id: { type: string, format: uuid }
                drop_off_address: { type: string }
                drop_off_lat: { type: number }
                drop_off_lng: { type: number }
                price: { type: number, default: 300 }
                day_of_week:
                  type: array
                  items: { type: integer, minimum: 0, maximum: 6 }
                  example: [1, 3, 5]
                start_date: { type: string, format: date }
                end_date: { type: string, format: date, nullable: true }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CarpoolSchedule' }
          description: ''

  /carpools/schedules/{id}:
    put:
      summary: Update schedule
      tags: [Carpools]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CarpoolSchedule' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CarpoolSchedule' }
          description: ''
    delete:
      summary: Cancel recurring schedule
      tags: [Carpools]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Cancelled }

  /staff/pickups/nearby:
    get:
      summary: Pickups whose parents are within radius (pre_queue)
      tags: [Staff Portal]
      parameters:
        - name: radius_m
          in: query
          schema: { type: integer, default: 500 }
      responses:
        '200':
          description: Nearby pickups
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/QueueItem' }

  /staff/pickups/all:
    get:
      summary: All pickups for today
      tags: [Staff Portal]
      parameters:
        - name: status
          in: query
          schema: { type: string }
      responses:
        '200':
          description: All pickups
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Pickup' }

  /staff/pickups/{pickup_id}/unmark:
    put:
      summary: Reset incorrect pickup mark back to queued
      tags: [Staff Portal]
      parameters:
        - name: pickup_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Pickup' }
          description: ''

  /display/queue:
    get:
      summary: Read-only queue feed for TV display (school-scoped display token)
      tags: [TV Display]
      security:
        - bearerAuth: []
      parameters:
        - name: lane
          in: query
          schema: { type: string, example: A }
      responses:
        '200':
          description: TV queue items
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DisplayQueueItem' }

  /display/token:
    get:
      summary: "(Admin only) Generate long-lived display token for TV"
      tags: [TV Display]
      responses:
        '200':
          description: Display token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  expires_at: { type: string, format: date-time }

  /auth/student/register:
    post:
      summary: Student self-registration via school email
      tags: [Student App]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [school_email, password]
              properties:
                school_email: { type: string }
                password: { type: string }
      responses:
        '201':
          description: Student account created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }

  /students/me:
    get:
      summary: Student profile (self)
      tags: [Student App]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Student' }
          description: ''

  /students/me/pickup-today:
    get:
      summary: Who is picking me up today and what is the status
      tags: [Student App]
      responses:
        '200':
          description: Today's pickup for student
          content:
            application/json:
              schema:
                type: object
                properties:
                  parent_name: { type: string }
                  vehicle: { type: string }
                  status: { type: string }
                  queue_number: { type: string, nullable: true }
                  eta_min: { type: integer, nullable: true }

  /students/me/notifications:
    get:
      summary: Student push notification history
      tags: [Student App]
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Notification' }

  /students/me/push-token:
    post:
      summary: Register FCM/APNs device token for Student App
      tags: [Student App]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_token, platform]
              properties:
                device_token: { type: string }
                platform: { type: string, enum: [ios, android] }
      responses:
        '201': { description: Token registered }

  /owner/schools:
    get:
      summary: List all schools on the platform
      tags: [Business Owner]
      responses:
        '200':
          description: Schools
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/School' }
    post:
      summary: Onboard a new school
      tags: [Business Owner]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                address: { type: string }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/School' }
          description: ''

  /owner/schools/{school_id}:
    get:
      summary: School detail
      tags: [Business Owner]
      parameters:
        - name: school_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/School' }
          description: ''

  /owner/schools/{school_id}/status:
    put:
      summary: Activate or suspend a school
      tags: [Business Owner]
      parameters:
        - name: school_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [active, suspended] }
      responses:
        '200': { description: Status updated }

  /owner/families:
    get:
      summary: All families across all schools
      tags: [Business Owner]
      parameters:
        - name: needs_payout
          in: query
          schema: { type: boolean }
        - name: school_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Families
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Family' }

  /owner/carpool-earnings:
    get:
      summary: Carpool earnings pending payout
      tags: [Business Owner]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [unpaid, paid] }
        - name: school_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Earnings list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string, format: uuid }
                    driver_id: { type: string, format: uuid }
                    driver_name: { type: string }
                    amount: { type: number }
                    paid_at: { type: string, format: date-time, nullable: true }

  /owner/carpool-earnings/{id}/payout:
    post:
      summary: Manually mark a carpool earning as paid out
      tags: [Business Owner]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Payout recorded }

  /owner/revenue:
    get:
      summary: Revenue dashboard metrics
      tags: [Business Owner]
      parameters:
        - name: period
          in: query
          schema: { type: string, enum: [daily, weekly, monthly, yearly] }
        - name: school_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Revenue metrics
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RevenueStats' }

x-schemas:
  PaymentMethod:
    type: object
    properties:
      id: { type: string, format: uuid }
      user_id: { type: string, format: uuid }
      method_type: { type: string, enum: [credit_card, bank_account] }
      card_last4: { type: string, nullable: true }
      card_brand: { type: string, nullable: true }
      bank_name: { type: string, nullable: true }
      bank_account_name: { type: string, nullable: true }
      is_default: { type: boolean }
      created_at: { type: string, format: date-time }

  AfterschoolActivity:
    type: object
    properties:
      id: { type: string, format: uuid }
      student_id: { type: string, format: uuid }
      activity_date: { type: string, format: date }
      activity_name: { type: string }
      end_time: { type: string, nullable: true }
      source: { type: string, enum: [manual, school_api] }

  CarpoolSchedule:
    type: object
    properties:
      id: { type: string, format: uuid }
      requester_id: { type: string, format: uuid }
      driver_id: { type: string, format: uuid }
      student_id: { type: string, format: uuid }
      drop_off_address: { type: string }
      price: { type: number }
      day_of_week:
        type: array
        items: { type: integer }
      start_date: { type: string, format: date }
      end_date: { type: string, format: date, nullable: true }
      is_active: { type: boolean }

  School:
    type: object
    properties:
      id: { type: string, format: uuid }
      name: { type: string }
      address: { type: string, nullable: true }
      logo_url: { type: string, nullable: true }
      created_at: { type: string, format: date-time }

  DisplayQueueItem:
    type: object
    properties:
      queue_number: { type: string }
      student_photo: { type: string, nullable: true }
      student_nickname: { type: string }
      student_grade: { type: string }
      driver_photo: { type: string, nullable: true }
      driver_name: { type: string }
      car_photo: { type: string, nullable: true }
      license_plate: { type: string }

  RevenueStats:
    type: object
    properties:
      revenue: { type: number }
      expenses: { type: number }
      gross_margin: { type: number }
      gross_margin_pct: { type: number }
      paid_pickups: { type: integer }
      chart_data:
        type: array
        items:
          type: object
          properties:
            date: { type: string }
            revenue: { type: number }
