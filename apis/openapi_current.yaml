openapi: 3.0.3

info:
  title: School Pickup & Carpool API
  description: API for Mobile + Staff + Admin.
  version: 1.0.0

servers:
  - url: TBA
    description: Production
  - url: https://backend-service-825571182172.asia-southeast3.run.app
    description: DEV

components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        password:
          tokenUrl: /oauth/token
          scopes: {}
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, example: Bearer }
        expires_in: { type: integer, example: 3600 }
        user_id: { type: string }
        role:
          type: array
          items:
            type: string
            enum: [primary_parent, additional_parent, supplementary, staff, admin, owner]
          description: Roles of the authenticated user — use this to show/hide UI elements on the client side

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        school_id: { type: string, format: uuid }
        family_id: { type: string, format: uuid, nullable: true }
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        role:
          type: string
          enum: [primary_parent, additional_parent, supplementary, staff, admin, owner]
        status:
          type: string
          enum: [active, pending, suspended, banned]
        invite_status:
          type: string
          enum: [sent, accepted, expired]
          nullable: true
        line_id: { type: string, nullable: true }
        profile_complete: { type: boolean }
        last_login: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    Family:
      type: object
      properties:
        id: { type: string, format: uuid }
        school_id: { type: string, format: uuid }
        family_name: { type: string }
        status: { type: string }
        joined_at: { type: string, format: date-time }
        members:
          type: array
          items:
            $ref: '#/components/schemas/User'

    Invitation:
      type: object
      properties:
        id: { type: string, format: uuid }
        family_id: { type: string, format: uuid }
        school_id: { type: string, format: uuid }
        inviter_id: { type: string, format: uuid }
        invitee_email: { type: string, format: email }
        invitee_role: { type: string }
        invite_code: { type: string }
        status: { type: string }
        expires_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    Error:
      type: object
      properties:
        error: { type: string }
        message: { type: string }
        status_code: { type: integer }

security:
  - bearerAuth: []

paths:
  /api/v1/auth/login:
    post:
      summary: Get access token (login)
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type, client_id]
              properties:
                grant_type: { type: string, enum: [password, refresh_token, "urn:ietf:params:oauth:grant-type:jwt-bearer"] }
                client_id: { type: string }
                username: { type: string }
                password: { type: string }
                refresh_token: { type: string }
                assertion: { type: string }
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/TokenResponse' }

  /api/v1/auth/register:
    post:
      summary: Register as primary parent
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [register_token, password, first_name, last_name, phone]
              properties:
                register_token: { type: string }
                password: { type: string }
                first_name: { type: string }
                last_name: { type: string }
                phone: { type: string }
      responses:
        '201':
          description: Account created, returns created user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '400':
          description: Invalid body request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Registration failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/auth/validate:
    post:
      summary: Validate access token
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [access_token]
              properties:
                access_token: { type: string }
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      valid: { type: boolean }
        '401':
          description: Token is invalid or expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/auth/invitations/{token}:
    get:
      summary: Validate invitation token
      tags: [Authentication]
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Invitation' }
        '404':
          description: Token not found or expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/auth/invitations/accept:
    post:
      summary: Accept invitation
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, firstName, lastName, phone, password]
              properties:
                token: { type: string }
                firstName: { type: string }
                lastName: { type: string }
                phone: { type: string }
                password: { type: string }
      responses:
        '201':
          description: Invitation accepted, user created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/otp/onboarding:
    post:
      summary: Send OTP to email
      tags: [OTP]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message: { type: string, example: otp sent }
                      reference: { type: string, example: REF-XXXXXX }
        '400':
          description: Invalid body request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Failed to send email
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/otp/onboarding/verify:
    post:
      summary: Verify OTP by reference
      tags: [OTP]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reference, otp]
              properties:
                reference: { type: string }
                otp: { type: string }
      responses:
        '200':
          description: OTP verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      register_token: { type: string }
        '400':
          description: Invalid body request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Invalid OTP or expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Could not verify OTP
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/otp/login:
    post:
      summary: Send OTP to phone
      tags: [OTP]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone: { type: string }
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message: { type: string, example: otp sent }
                      reference: { type: string, example: REF-XXXXXX }
        '404':
          description: User not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Failed to send SMS
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/otp/login/verify:
    post:
      summary: Verify login OTP and get assertion token
      tags: [OTP]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reference, otp]
              properties:
                reference: { type: string }
                otp: { type: string }
      responses:
        '200':
          description: OTP verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      assertion: { type: string }
        '401':
          description: Invalid OTP or expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Could not verify OTP
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/families/me:
    get:
      summary: Get current user's family
      tags: [Family]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Family' }
        '500':
          description: Internal server error

  /api/v1/families/me/members:
    get:
      summary: List members of current user's family
      tags: [Family]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }
        '500':
          description: Internal server error

  /api/v1/families/me/members/{user_id}:
    delete:
      summary: Remove a member from current user's family
      tags: [Family]
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Member removed
        '400':
          description: Invalid user ID
        '500':
          description: Internal server error

  /api/v1/families/me/invitations:
    get:
      summary: List sent invitations for current user's family
      tags: [Family]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Invitation' }
        '500':
          description: Internal server error
    post:
      summary: Invite a new family member
      tags: [Family]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string, format: email }
                role: { type: string }
      responses:
        '201':
          description: Invitation sent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Invitation' }
        '500':
          description: Internal server error
